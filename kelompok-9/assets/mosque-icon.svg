<svg width="40" height="50" viewBox="0 0 40 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow circle -->
  <circle cx="20" cy="45" r="12" fill="#00000020"/>
  
  <!-- Main building (emas/coklat) -->
  <rect x="8" y="20" width="24" height="18" fill="#D4A574" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Dome (kubah mesjid) -->
  <circle cx="20" cy="15" r="10" fill="#D4A574" stroke="#8B7355" stroke-width="1"/>
  
  <!-- Top of dome (crescent) -->
  <g>
    <circle cx="20" cy="12" r="6" fill="#D4A574"/>
    <circle cx="20" cy="10" r="5" fill="white"/>
  </g>
  
  <!-- Star on dome -->
  <text x="20" y="16" font-size="8" fill="#8B7355" text-anchor="middle" dominant-baseline="middle">✶</text>
  
  <!-- Door -->
  <rect x="17" y="28" width="6" height="8" fill="#8B7355"/>
  
  <!-- Windows -->
  <rect x="11" y="24" width="3" height="3" fill="#87CEEB"/>
  <rect x="26" y="24" width="3" height="3" fill="#87CEEB"/>
  <rect x="11" y="30" width="3" height="3" fill="#87CEEB"/>
  <rect x="26" y="30" width="3" height="3" fill="#87CEEB"/>
  
  <!-- Minaret (menara) - kiri -->
  <rect x="5" y="10" width="3" height="28" fill="#C19A6B" stroke="#8B7355" stroke-width="0.5"/>
  <circle cx="6.5" cy="8" r="2" fill="#D4A574"/>
  
  <!-- Minaret (menara) - kanan -->
  <rect x="32" y="10" width="3" height="28" fill="#C19A6B" stroke="#8B7355" stroke-width="0.5"/>
  <circle cx="33.5" cy="8" r="2" fill="#D4A574"/>
</svg>
