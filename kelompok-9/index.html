<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Marker - Tugas Kelompok</title>
    <!-- Memuat Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <!-- Memuat file CSS kustom -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/search.css" />
  </head>
  <body>
    <header>
      <h1>Proyek Map Marker Kelompok 9</h1>
      <p>Lokasi: Masjid Raya Baiturrahman, Banda Aceh</p>
    </header>

    <!-- Kontainer Peta dan Search -->
    <div class="search-container">
      <input
        type="text"
        id="search-input"
        placeholder="Cari sebuah tempat (misal: Masjid Raya, Tsunami Museum, dll.)"
      />
      <button id="search-btn">Cari</button>
      <div id="search-results" class="search-results"></div>
    </div>

    <div class="map-controls">
      <button id="btn-locate">📍 Lokasi Saya</button>
    </div>
    <div id="map"></div>

    <!-- Memuat Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <!-- Memuat script js kustom -->
    <script src="js/map.js"></script>
    <script src="js/search.js"></script>
  </body>
</html>
